# Wakapi — DHI-hardened fork
# Builds and pushes to ghcr.io/yaelmoshi/wakapi-dhi
when:
  - event: manual
  - event: push
    branch: master
    path:
      include: ["**/*.go", "go.*", "vendor/**", "dhi/**", ".woodpecker/**"]

steps:
  - name: build-and-push-ghcr
    image: woodpeckerci/plugin-docker-buildx:6.0.4-insecure@sha256:3931a442d6caeacdefdd61c511c8c05528911545fb916f0c1e25bce0006ad785
    privileged: true
    settings:
      registry: ghcr.io
      repo: ghcr.io/yaelmoshi/wakapi-dhi
      dockerfile: dhi/wakapi.yaml
      platforms: linux/amd64
      tags:
        - "${CI_COMMIT_SHA:0:8}"
        - "2.17.4-yaelmoshi.2"
        - "2.17.4-yaelmoshi.2-alpine3.24"
        - latest
        - latest-alpine3.24
      cache_images:
        - ghcr.io/yaelmoshi/wakapi-dhi:buildcache
      logins:
        - registry: ghcr.io
          username: yaelmoshi
          password:
            from_secret: github_token
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_password
      provenance: mode=max
      sbom: generator=dhi.io/scout-sbom-indexer:1
      buildkit_driveropt: network=host
