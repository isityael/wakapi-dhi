# syntax=dhi.io/build:2-debian13

name: Wakapi DHI
image: ghcr.io/yaelmoshi/wakapi-dhi
variant: runtime
tags:
  - 2.17.3-yaelmoshi.2
  - 2.17.3-yaelmoshi.2-debian13
  - latest
  - latest-debian13
platforms:
  - linux/amd64
dates:
  release: "2026-06-09"
vars:
  BASE_DIGEST: sha256:5561af898afa6015a84d39a2cefdfc7fc386f45026d7834c95d8dbc450061563
  BASE_TAG: 20250419-debian13
  COMMIT_SHA: 3c342cb9ab1ac818cfacb4166d71fc4e135d415d
  GOLANG_REFERENCE: dhi.io/golang:1.26.4-debian13-dev@sha256:9350c6e0c0a06f23b487c39850188b2a5c2bd176d1fc5ae361400c8c068e42b0
  WAKAPI_VERSION: 2.17.3-yaelmoshi.2
contents:
  packages:
    - '!base-files'
  builds:
    - name: wakapi
      uses: dhi.io/golang:1.26.4-debian13-dev@sha256:9350c6e0c0a06f23b487c39850188b2a5c2bd176d1fc5ae361400c8c068e42b0
      work-dir: /go/src/github.com/yaelmoshi/wakapi-dhi
      caches:
        - path: /go/pkg/mod
      contents:
        packages:
          - sed
        files:
          - url: git+https://github.com/yaelmoshi/wakapi-dhi.git#${COMMIT_SHA}
            checksum: ${COMMIT_SHA}
            path: /go/src/github.com/yaelmoshi/wakapi-dhi
            spdx:
              name: wakapi-dhi
              version: ${WAKAPI_VERSION}
              packages:
                - name: wakapi
                  purl: pkg:golang/github.com/yaelmoshi/wakapi-dhi@${WAKAPI_VERSION}
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: build wakapi
          runs: |
            set -eux -o pipefail
            CGO_ENABLED=0 GOFLAGS=-mod=vendor GOEXPERIMENT=jsonv2 go build -trimpath -ldflags "-s -w" -o "${target.dir}/app/wakapi" .
        - name: build healthcheck
          runs: |
            set -eux -o pipefail
            CGO_ENABLED=0 GOFLAGS=-mod=vendor go build -trimpath -ldflags "-s -w" -o "${target.dir}/app/healthcheck" ./scripts/healthcheck.go
        - name: install defaults
          runs: |
            set -eux -o pipefail
            mkdir -p "${target.dir}/app" "${target.dir}/data"
            cp config.default.yml "${target.dir}/app/config.yml"
            sed -i 's/listen_ipv6: ::1/listen_ipv6: "-"/g' "${target.dir}/app/config.yml"
            chmod 0555 "${target.dir}/app/wakapi" "${target.dir}/app/healthcheck"
            chmod 0444 "${target.dir}/app/config.yml"
            chown -R 65532:65532 "${target.dir}/app" "${target.dir}/data"
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 65532
          gid: 65532
        - source: ${target.dir}/data
          target: /data
          uid: 65532
          gid: 65532
  artifacts:
    - name: dhi.io/static:20250419-debian13@sha256:5561af898afa6015a84d39a2cefdfc7fc386f45026d7834c95d8dbc450061563
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - var/lib/dpkg/status
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Debian)
  id: debian
  version-id: "13"
  version-codename: trixie
  pretty-name: Docker Hardened Images/Debian GNU/Linux 13 (trixie)
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  ENVIRONMENT: prod
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
  WAKAPI_ALLOW_SIGNUP: "true"
  WAKAPI_DB_HOST: ""
  WAKAPI_DB_NAME: /data/wakapi.db
  WAKAPI_DB_PASSWORD: ""
  WAKAPI_DB_TYPE: sqlite3
  WAKAPI_DB_USER: ""
  WAKAPI_INSECURE_COOKIES: "true"
  WAKAPI_LISTEN_IPV4: 0.0.0.0
  WAKAPI_PASSWORD_SALT: ""
annotations:
  org.opencontainers.image.created: "2026-06-09T00:00:00Z"
  org.opencontainers.image.documentation: https://github.com/muety/wakapi
  org.opencontainers.image.licenses: MIT
  org.opencontainers.image.revision: ${COMMIT_SHA}
  org.opencontainers.image.source: https://github.com/yaelmoshi/wakapi-dhi
  org.opencontainers.image.title: Wakapi DHI
  org.opencontainers.image.url: https://github.com/yaelmoshi/wakapi-dhi
  org.opencontainers.image.version: ${WAKAPI_VERSION}
entrypoint:
  - /app/wakapi
ports:
  - 3000/tcp
volumes:
  - /data
