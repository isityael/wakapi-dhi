# syntax=dhi.io/build:2-alpine3.24@sha256:1d0f4fff350f7b03e160bc7d6651609c448240ea8fc08e3714c19e2f64c91c81

name: Wakapi DHI
image: ghcr.io/isityael/wakapi-dhi
variant: runtime
tags:
  - 2.17.4-yaelmoshi.2
  - 2.17.4-yaelmoshi.2-alpine3.24
  - latest
  - latest-alpine3.24
platforms:
  - linux/amd64
dates:
  release: "2026-06-09"
vars:
  BASE_DIGEST: sha256:390fea8b496568bd8e8f085ab8a1c92403d9baa047e1f82436c7874694de2c2d
  BASE_TAG: 20260611-alpine3.24
  COMMIT_SHA: 3c342cb9ab1ac818cfacb4166d71fc4e135d415d
  GOLANG_REFERENCE: dhi.io/golang:1.26.4-alpine3.24-dev@sha256:8c0a72d824e41949727f0907f851fff7bbd26b788d8e116facdddf84cb9f2905
  WAKAPI_VERSION: 2.17.4-yaelmoshi.2
contents:
  builds:
    - name: wakapi
      uses: dhi.io/golang:1.26.4-alpine3.24-dev@sha256:8c0a72d824e41949727f0907f851fff7bbd26b788d8e116facdddf84cb9f2905
      work-dir: /go/src/github.com/isityael/wakapi-dhi
      caches:
        - path: /go/pkg/mod
      contents:
        # DHI build:2 requires a package that is not already in the builder.
        # libmd is a small, dependency-safe frontend seed; unlike sed, it only
        # depends on musl and does not pull a conflicting busybox-binsh package.
        packages:
          - libmd=1.2.0-r0
        files:
          - url: git+https://github.com/isityael/wakapi-dhi.git#${COMMIT_SHA}
            checksum: ${COMMIT_SHA}
            path: /go/src/github.com/isityael/wakapi-dhi
            spdx:
              name: wakapi-dhi
              version: ${WAKAPI_VERSION}
              packages:
                - name: wakapi
                  purl: pkg:golang/github.com/isityael/wakapi-dhi@${WAKAPI_VERSION}
                  license: MIT
            uid: 0
            gid: 0
      pipeline:
        - name: build wakapi
          runs: |
            set -eux -o pipefail
            CGO_ENABLED=0 GOFLAGS=-mod=vendor GOEXPERIMENT=jsonv2 go build -trimpath -ldflags "-s -w" -o "${target.dir}/app/wakapi" .
        - name: build healthcheck
          runs: |
            set -eux -o pipefail
            CGO_ENABLED=0 GOFLAGS=-mod=vendor go build -trimpath -ldflags "-s -w" -o "${target.dir}/app/healthcheck" ./scripts/healthcheck.go
        - name: install defaults
          runs: |
            set -eux -o pipefail
            mkdir -p "${target.dir}/app" "${target.dir}/data"
            while IFS= read -r line; do
              case "$line" in
                *"listen_ipv6: ::1"*) printf '%s\n' '  listen_ipv6: "-"                    # set to '\''-'\'' to disable ipv6' ;;
                *) printf '%s\n' "$line" ;;
              esac
            done < config.default.yml > "${target.dir}/app/config.yml"
            chmod 0555 "${target.dir}/app/wakapi" "${target.dir}/app/healthcheck"
            chmod 0444 "${target.dir}/app/config.yml"
            chown -R 65532:65532 "${target.dir}/app" "${target.dir}/data"
      outputs:
        - source: ${target.dir}/app
          target: /app
          uid: 65532
          gid: 65532
        - source: ${target.dir}/data
          target: /data
          uid: 65532
          gid: 65532
  artifacts:
    - name: dhi.io/static:20260611-alpine3.24@sha256:390fea8b496568bd8e8f085ab8a1c92403d9baa047e1f82436c7874694de2c2d
      includes:
        - bin
        - etc
        - home
        - lib
        - lib64
        - opt
        - sbin
        - tmp
        - usr
        - var
      excludes:
        - etc/group
        - etc/os-release
        - etc/passwd
        - lib/apk/db/installed
      uid: 0
      gid: 0
accounts:
  run-as: nonroot
  users:
    - name: nonroot
      uid: 65532
      gid: 65532
  groups:
    - name: nonroot
      gid: 65532
      members:
        - nonroot
os-release:
  name: Docker Hardened Images (Alpine)
  id: alpine
  version-id: "3.24"
  pretty-name: Docker Hardened Images/Alpine Linux v3.24
  home-url: https://docker.com/products/hardened-images/
  bug-report-url: https://docker.com/support/
work-dir: /app
environment:
  ENVIRONMENT: prod
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
  WAKAPI_ALLOW_SIGNUP: "true"
  WAKAPI_DB_HOST: ""
  WAKAPI_DB_NAME: /data/wakapi.db
  WAKAPI_DB_PASSWORD: ""
  WAKAPI_DB_TYPE: sqlite3
  WAKAPI_DB_USER: ""
  WAKAPI_INSECURE_COOKIES: "true"
  WAKAPI_LISTEN_IPV4: 0.0.0.0
  WAKAPI_PASSWORD_SALT: ""
annotations:
  org.opencontainers.image.created: "2026-06-09T00:00:00Z"
  org.opencontainers.image.documentation: https://github.com/muety/wakapi
  org.opencontainers.image.licenses: MIT
  org.opencontainers.image.revision: ${COMMIT_SHA}
  org.opencontainers.image.source: https://github.com/isityael/wakapi-dhi
  org.opencontainers.image.title: Wakapi DHI
  org.opencontainers.image.url: https://github.com/isityael/wakapi-dhi
  org.opencontainers.image.version: ${WAKAPI_VERSION}
entrypoint:
  - /app/wakapi
ports:
  - 3000/tcp
volumes:
  - /data
